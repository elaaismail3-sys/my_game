<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Rock ✨ Paper 📄 Scissors ✂️</h1>
        
        <div class="score-board">
            <div class="score">
                <h2>ayoub</h2>
                <p id="player-score">0</p>
            </div>
            <div class="score">
                <h2>elaa</h2>
                <p id="computer-score">0</p>
            </div>
        </div>

        <div class="choices">
            <button class="choice" id="rock">🪨 <br> Rock</button>
            <button class="choice" id="paper">📄 <br> Paper</button>
            <button class="choice" id="scissors">✂️ <br> Scissors</button>
        </div>

        <div class="result">
            <h2 id="result-text">Choose your move to start!</h2>
            <p id="choice-display"></p>
        </div>

        <button class="reset-btn" onclick="resetGame()">🔄 Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
